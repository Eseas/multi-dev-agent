# config-example.yaml
# 실제 설정은 config.yaml에 작성. 이 파일은 구조 참고용 예시입니다.

# GitHub 토큰 목록 (이름: 값)
github_tokens:
  personal: "ghp_xxxxxxxxxxxxxxxxxxxx"
  work: "ghp_yyyyyyyyyyyyyyyyyyyy"

# 서비스별 워크스페이스 설정
workspaces:
  my-service:
    path: ./workspaces/my-service    # 이 서비스의 워크스페이스 경로

    projects:                        # 구성 레포지토리 목록
      be:
        target_repo: "https://github.com/OrgName/MyService-BE.git"
        default_branch: "master"
        github_token: "personal"     # github_tokens의 키 이름
      fe:
        target_repo: "https://github.com/OrgName/MyService-FE.git"
        default_branch: "main"
        github_token: "personal"

    server:                          # 서버 접속 정보 (선택)
      type: "oracle-cloud"           # oracle-cloud / aws-ec2 / gcp-compute 등
      host: "xxx.xxx.xxx.xxx"
      user: "ubuntu"

    db:                              # 데이터베이스 접속 정보 (선택)
      type: "postgresql"             # postgresql / mysql / mongodb 등
      host: "localhost"
      port: 5432
      name: "myservice_db"

prompts:
  directory: ./prompts

execution:
  timeout: 600          # 에이전트 실행 타임아웃 (초)
  max_retries: 3        # 실패 시 최대 재시도 횟수

pipeline:
  checkpoint_phase1: true   # Phase 1 완료 후 사용자 확인
  num_approaches: 1         # 병렬 구현 개수 (1~3)
  enable_review: true       # Phase 3 리뷰 활성화
  enable_test: true         # Phase 3 테스트 활성화

# 기획서 완료 폴더 감시 설정
watch:
  dirs:
    - workspace: "my-service"
      path: ./workspaces/my-service/planning/completed

validation:
  enabled: true         # 기획서 유효성 검증 활성화
  auto_revalidate: true # 기획서 수정 시 자동 재검증
  strict_mode: false    # true면 경고도 실패로 처리

permissions:
  allow:                # 자동 허용 (사용자 확인 없이 실행)
    - "Read(*)"
    - "Glob(*)"
    - "Grep(*)"
    - "Write(src/**)"
    - "Edit(src/**)"
  deny:                 # 자동 거부 (절대 실행 안 함)
    - "Bash(rm -rf *)"
    - "Bash(sudo *)"
  ask:                  # 사용자 승인 필요
    - "Bash(*)"
    - "Write(*)"
  ask_timeout: 300      # 승인 대기 시간 (초)

queue:
  default_timeout: 3600     # 기본 질문 타임아웃 (초)
  permission_timeout: 300   # 권한 질문 타임아웃 (초)
  checkpoint_timeout: 3600  # 체크포인트 타임아웃 (초)

notifications:
  enabled: true
  sound: true
